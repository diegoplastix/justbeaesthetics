[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Serve markdown mirrors and llms.txt as plain text in the browser so
# AI crawlers can read them without the browser forcing a download.
[[headers]]
  for = "/*.md"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"
    X-Robots-Tag = "index, follow"

[[headers]]
  for = "/llms.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml; charset=utf-8"

# Preserve trailing-slash URLs from the WordPress original
[[redirects]]
  from = "/*"
  to = "/:splat/index.html"
  status = 200
  conditions = {Role = ["admin"]}

# Standard fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 404
