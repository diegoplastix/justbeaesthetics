[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Preserve trailing-slash URLs from the WordPress original
[[redirects]]
  from = "/*"
  to = "/:splat/index.html"
  status = 200
  conditions = {Role = ["admin"]}

# Standard fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 404
